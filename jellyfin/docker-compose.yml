services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    # user: 1000:1000  # Commented out to run as root
    ports:
      - 8096:8096/tcp
      - 7359:7359/udp
    volumes:
      - ./jellyfin-config:/config
      - ./jellyfin-cache:/cache
      - type: bind
        source: /mnt/jellyfin-media
        target: /media
        read_only: true
    restart: 'unless-stopped'
    environment:
      - JELLYFIN_PublishedServerUrl=http://172.21.21.99:8096